<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      margin: 0;
      background-color: #0d1117;
      color: #c9d1d9;
    }
    h2 {
      margin-top: 0;
      color: #58a6ff;
      font-size: 18px;
    }
    p {
      font-size: 14px;
      line-height: 1.5;
      color: #8b949e;
    }
    button {
      background-color: #238636;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #2ea043;
    }
    button:disabled {
      background-color: #21262d;
      color: #484f58;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
      font-weight: 500;
    }
    .success {
      color: #3fb950;
    }
    .error {
      color: #f85149;
    }
  </style>
</head>
<body>
  <h2>Gravio Sync</h2>
  <p>To securely connect your Schoology account to Gravio, ensure you are logged into Schoology, then click the button below.</p>
  
  <button id="sync-btn">Connect Schoology Account</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
